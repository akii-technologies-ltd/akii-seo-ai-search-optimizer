name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: scripts/validate.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run validator
        run: bash scripts/validate.sh

      - name: Test bump-version (round-trip)
        run: bash scripts/test-bump-version.sh
